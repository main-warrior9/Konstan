<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konstan Clube de Investimentos em Ações</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='2' y='2' width='36' height='36' rx='8' fill='%23080b14'/%3E%3Crect x='2' y='2' width='36' height='36' rx='8' fill='%2356b3e8' opacity='0.15'/%3E%3Cline x1='10' y1='30' x2='10' y2='14' stroke='%2356b3e8' stroke-width='2' opacity='0.5'/%3E%3Crect x='8' y='18' width='4' height='8' rx='0.5' fill='%2322c55e'/%3E%3Cline x1='17' y1='30' x2='17' y2='10' stroke='%2356b3e8' stroke-width='2' opacity='0.5'/%3E%3Crect x='15' y='10' width='4' height='10' rx='0.5' fill='%23ef4444'/%3E%3Cline x1='24' y1='30' x2='24' y2='8' stroke='%2356b3e8' stroke-width='2' opacity='0.5'/%3E%3Crect x='22' y='12' width='4' height='12' rx='0.5' fill='%2322c55e'/%3E%3Cline x1='31' y1='30' x2='31' y2='6' stroke='%2356b3e8' stroke-width='2' opacity='0.5'/%3E%3Crect x='29' y='6' width='4' height='14' rx='0.5' fill='%2322c55e'/%3E%3Cline x1='6' y1='32' x2='34' y2='32' stroke='%2356b3e8' stroke-width='1' opacity='0.3'/%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ac:#56b3e8;--ac2:#8bc9f0;--bg:#080b14;--card:rgba(255,255,255,0.022);--bd:rgba(255,255,255,0.065);--grn:#22c55e;--red:#ef4444;--tx:#C8CCD2;--tx2:#97a2b4;--tx3:#79859a;--tx4:#6b7689;--cdi:#fbbf24;--ibov:#f87171;--sp:#a78bfa;--glow:rgba(86,179,232,0.4);--s1:8px;--s2:16px;--s3:24px;--s4:32px;--s5:40px;--s6:48px;--r-ctrl:10px;--r-card:12px;--r-box:16px;--shadow:0 1px 2px rgba(0,0,0,0.4),0 12px 28px -10px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.05)}
body{background:radial-gradient(1100px 520px at 50% -8%,rgba(86,179,232,0.10),transparent 62%),radial-gradient(820px 500px at 100% 2%,rgba(167,139,250,0.06),transparent 58%),var(--bg);background-attachment:fixed;color:var(--tx);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-0.01em}
.hidden{display:none!important}
.header{padding:32px 32px 24px;background:linear-gradient(180deg,rgba(86,179,232,0.03) 0%,transparent 100%);border-bottom:1px solid var(--bd)}
.header-inner{display:flex;align-items:center;gap:14px}
.header h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-0.5px;font-family:'Inter',system-ui,sans-serif}
.header h1 span{color:var(--ac);font-weight:800}
.header .sub{font-size:11px;color:var(--tx3);margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:0.3px}
.refresh-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--bd);background:var(--card);color:var(--tx3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;margin-left:auto}
.refresh-btn:hover{color:var(--ac);background:rgba(86,179,232,0.08)}
.refresh-btn.spinning{transform:rotate(360deg);color:var(--ac)}
.tabs-wrap{padding:0 28px;border-bottom:1px solid var(--bd)}
.tabs{display:flex;gap:54px;background:transparent;border-radius:0;padding:0;border:none;flex-wrap:wrap}
.tab-btn{padding:18px 0 16px;border-radius:0;border:none;background:transparent;color:var(--tx3);font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:color 0.2s;letter-spacing:1.4px;text-transform:uppercase;display:inline-flex;align-items:baseline;gap:10px;position:relative}
.tab-btn:hover{color:var(--tx2);background:transparent}
.tab-btn.active{background:transparent;color:var(--tx)}
.tab-btn.active::after{content:"";position:absolute;left:0;right:auto;bottom:-1px;height:1.5px;width:24px;background:var(--ac);border-radius:1px}
.tab-num{display:inline;align-items:initial;justify-content:initial;width:auto;height:auto;border-radius:0;background:transparent;color:var(--tx4);font-size:10px;font-weight:500;font-family:'JetBrains Mono',monospace;transition:color 0.2s;letter-spacing:0.5px}
.tab-btn.active .tab-num{background:transparent;color:var(--ac)}
.tab-btn:hover .tab-num{background:transparent;color:var(--tx3)}
.content{padding:24px 32px 40px;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:32px}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-card);padding:16px 20px;transition:all 0.3s;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--ac),transparent);opacity:0;transition:opacity 0.3s}
.kpi:hover{background:rgba(86,179,232,0.04);border-color:rgba(86,179,232,0.15);transform:translateY(-1px)}
.kpi:hover::before{opacity:1}
.kpi-label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:8px;font-weight:600;font-family:'Inter',system-ui,sans-serif}
.kpi-value{font-size:21px;font-weight:600;color:var(--tx);font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;background:var(--card);border:1px solid var(--bd);border-radius:var(--r-card);padding:10px 14px}
.date-input{background:rgba(255,255,255,0.03);border:1px solid var(--bd);border-radius:var(--r-ctrl);padding:8px 14px;color:var(--tx);font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;cursor:pointer;color-scheme:dark;min-width:150px;transition:all 0.2s}
.date-input:focus,.date-input:hover{border-color:var(--ac)}
.date-label{font-size:10px;color:var(--tx2);font-weight:600;margin-right:4px;letter-spacing:0.5px;text-transform:uppercase;font-family:'Inter',system-ui,sans-serif}
.section-title{font-size:13px;color:var(--tx2);font-weight:600;margin-bottom:16px;letter-spacing:0.4px;text-transform:uppercase;display:flex;align-items:center;gap:10px;font-family:'Inter',system-ui,sans-serif}
.section-title::before{content:"";width:3px;height:14px;background:var(--ac);border-radius:2px;display:inline-block}
.chart-box{background:var(--card);border-radius:var(--r-box);border:1px solid var(--bd);padding:16px 12px 12px}
.chart-h{position:relative;height:350px}
.chart-h-md{position:relative;height:340px}
.chart-h-sm{position:relative;height:260px}
.fade-in{animation:fadeIn 0.3s ease}
.toggle-row{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap;padding:0 8px}
.toggle-item{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;font-family:'Inter',system-ui,sans-serif;font-weight:600;user-select:none;letter-spacing:0.3px;transition:opacity 0.2s}
.toggle-dot{width:12px;height:3px;border-radius:2px}
.toggle-item.off{opacity:0.3}
.perf-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:24px}
.perf-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-card);padding:16px 20px;transition:all 0.3s}
.perf-card:hover{border-color:rgba(86,179,232,0.15)}
.perf-card .label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.6px;margin-bottom:8px;font-weight:600;font-family:'Inter',system-ui,sans-serif}
.perf-card .big{font-size:23px;font-weight:700;color:var(--tx);font-family:'JetBrains Mono',monospace;letter-spacing:-0.5px}
.perf-card .small{font-size:11px;margin-top:6px;font-weight:500;font-family:'JetBrains Mono',monospace}
.annual-grid{display:grid;gap:12px;margin-bottom:32px}
.annual-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-card);padding:16px 16px;text-align:center;transition:all 0.3s}
.annual-card:hover{border-color:rgba(86,179,232,0.15)}
.data-table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:12px}
.data-table th{padding:14px 16px;color:var(--tx3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;border-bottom:1px solid var(--bd);font-family:'Inter',system-ui,sans-serif}
.data-table td{padding:11px 16px;border-bottom:1px solid var(--bd)}
.data-table tr:hover{background:rgba(86,179,232,0.03)}
.part-bar{width:50px;height:4px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px}
.part-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:4px}
.totals-row{margin-top:16px;background:var(--card);border-radius:var(--r-box);border:1px solid var(--bd);padding:16px 24px;display:flex;justify-content:space-around;flex-wrap:wrap;gap:14px}
.input-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-box);padding:24px;margin-bottom:16px}
.input-card h3{margin:0;font-size:15px;font-weight:700;color:var(--tx);display:inline}
.input-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.input-label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:700;display:block}
.input-field{background:rgba(255,255,255,0.03);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--tx);font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;width:100%;margin-bottom:14px}
.btn-cota{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#0c4a6e,#0369a1);color:var(--ac);font-size:13px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace}
.btn-aporte{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b0764,#5b21b6);color:#a78bfa;font-size:13px;font-weight:700;cursor:pointer;font-family:'JetBrains Mono',monospace}
.log-box{margin-top:24px;background:var(--card);border-radius:var(--r-box);border:1px solid var(--bd);padding:16px}
.log-entry{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)}
.log-entry:last-child{border-bottom:none}
.lock-screen{display:flex;align-items:center;justify-content:center;min-height:400px}
.lock-box{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-box);padding:40px 36px;width:320px;text-align:center}
.lock-icon{width:56px;height:56px;border-radius:16px;background:rgba(86,179,232,0.07);border:1px solid rgba(86,179,232,0.13);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.login-input{background:rgba(255,255,255,0.03);border:1px solid var(--bd);border-radius:var(--r-ctrl);padding:14px 18px;color:var(--tx);font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;width:100%;text-align:center;margin-bottom:14px;letter-spacing:1px}
.login-input.error{border-color:#ef4444}
.login-btn{width:100%;padding:14px;border-radius:var(--r-ctrl);border:none;background:linear-gradient(135deg,#0c4a6e,#0369a1);color:var(--ac);font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',system-ui,sans-serif;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.2s}
.login-btn:hover{opacity:0.9;transform:translateY(-1px)}
.err-msg{color:#ef4444;font-size:11px;font-family:'JetBrains Mono',monospace;margin:-8px 0 12px}
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ind-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-box);padding:24px;transition:all 0.3s}
.ind-card:hover{border-color:rgba(86,179,232,0.15)}
.ind-card h4{font-size:12px;color:var(--tx2);font-weight:600;margin:0 0 16px;letter-spacing:0.4px;text-transform:uppercase;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;gap:10px}
.ind-card h4::before{content:"";width:3px;height:12px;background:var(--ac);border-radius:2px;display:inline-block}
.input-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px;align-items:end}
.report-config{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-box);padding:24px}
.report-section{margin-bottom:22px}
.report-section h4{font-size:11px;color:var(--tx2);font-weight:600;margin:0 0 12px;letter-spacing:0.6px;text-transform:uppercase;font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;gap:10px}
.report-section h4::before{content:"";width:3px;height:12px;background:var(--ac);border-radius:2px;display:inline-block}
.report-checks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.report-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-family:'Inter',system-ui,sans-serif;color:var(--tx2);padding:10px 14px;border-radius:var(--r-ctrl);border:1px solid var(--bd);transition:all 0.2s;user-select:none;font-weight:500}
.report-check:hover{border-color:rgba(86,179,232,0.3);color:var(--tx)}
.report-check.checked{border-color:var(--bd);background:transparent;color:var(--tx2)}
.report-check .check-box{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--tx3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.report-check.checked .check-box{border-color:var(--ac);background:var(--ac)}
.report-textarea{background:rgba(255,255,255,0.03);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--tx);font-size:13px;font-family:'Inter',system-ui,sans-serif;outline:none;width:100%;min-height:80px;resize:vertical;line-height:1.5}
.report-textarea:focus{border-color:var(--ac)}
.btn-export{padding:14px 32px;border-radius:10px;border:none;background:linear-gradient(135deg,#0c4a6e,#0369a1);color:var(--ac);font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',system-ui,sans-serif;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;letter-spacing:1px;text-transform:uppercase}
.btn-export:hover{opacity:0.85;transform:translateY(-1px)}
.btn-xlsx{padding:14px 32px;border-radius:10px;border:none;background:linear-gradient(135deg,#065f46,#059669);color:#6ee7b7;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',system-ui,sans-serif;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;letter-spacing:1px;text-transform:uppercase;box-shadow:0 8px 20px -8px rgba(5,150,105,0.7),inset 0 1px 0 rgba(255,255,255,0.1)}
.btn-xlsx:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 12px 26px -8px rgba(5,150,105,0.85),inset 0 1px 0 rgba(255,255,255,0.12)}
.report-preview{background:rgba(255,255,255,0.02);border:1px solid var(--bd);border-radius:var(--r-box);padding:20px;margin-top:20px}
/* ============ MODERNIZAÇÃO VISUAL (mantém paleta escura + acento azul) ============ */
/* Cards em vidro fosco com profundidade */
.kpi,.perf-card,.annual-card,.chart-box,.ind-card,.totals-row,.input-card,.log-box,.report-config,.report-preview,.filter-row,.lock-box{
  background:linear-gradient(158deg,rgba(255,255,255,0.045),rgba(255,255,255,0.012));
  box-shadow:var(--shadow);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
/* Hover unificado com leve brilho azul */
.kpi:hover,.perf-card:hover,.annual-card:hover,.ind-card:hover{
  border-color:rgba(86,179,232,0.24);
  box-shadow:0 1px 2px rgba(0,0,0,0.4),0 18px 36px -12px rgba(0,0,0,0.62),0 0 24px -6px rgba(86,179,232,0.18),inset 0 1px 0 rgba(255,255,255,0.06);
}
/* KPIs: acento lateral sempre visível e valores mais nítidos */
.kpi::before{opacity:0.35;width:2.5px}
.kpi-value{color:#fff;text-shadow:0 0 18px rgba(86,179,232,0.12)}
/* Header com brilho na marca e no logo */
.header{background:linear-gradient(180deg,rgba(86,179,232,0.06),transparent 72%)}
.header-inner>svg:first-child{filter:drop-shadow(0 0 12px rgba(86,179,232,0.45))}
.header h1 span{text-shadow:0 0 22px rgba(86,179,232,0.4)}
/* Abas: indicador ativo com glow */
.tab-btn.active::after{height:2px;width:30px;box-shadow:0 0 12px 1px var(--glow)}
.tab-btn{transform-origin:left bottom;transition:color 0.25s,opacity 0.25s,transform 0.28s cubic-bezier(.2,.7,.2,1),text-shadow 0.25s}
.tab-btn.active{font-weight:700;text-shadow:0 0 16px rgba(86,179,232,0.28);transform:scale(1.15)}
.tab-btn:not(.active){opacity:0.72}
.tab-btn:hover:not(.active){opacity:1}
/* Títulos de seção: barra com gradiente e brilho, texto mais claro */
.section-title{color:var(--tx)}
.section-title::before,.ind-card h4::before,.report-section h4::before{background:linear-gradient(180deg,var(--ac),var(--ac2));box-shadow:0 0 8px rgba(86,179,232,0.5)}
/* Botões de ação com profundidade */
.login-btn,.btn-export,.btn-cota{box-shadow:0 8px 20px -8px rgba(3,105,161,0.75),inset 0 1px 0 rgba(255,255,255,0.1)}
.btn-aporte{box-shadow:0 8px 20px -8px rgba(91,33,182,0.75),inset 0 1px 0 rgba(255,255,255,0.1)}
.login-btn:hover,.btn-export:hover{box-shadow:0 12px 26px -8px rgba(3,105,161,0.9),inset 0 1px 0 rgba(255,255,255,0.12)}
/* Tabela: cabeçalho destacado e linhas com hover azul */
.data-table thead{background:rgba(86,179,232,0.04)}
.data-table tr:hover{background:rgba(86,179,232,0.05)}
/* Barra de rolagem moderna */
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:rgba(86,179,232,0.18);border-radius:8px;border:2px solid transparent;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:rgba(86,179,232,0.34);background-clip:content-box}
html{scrollbar-color:rgba(86,179,232,0.25) transparent;scrollbar-width:thin}
/* Inputs com foco luminoso */
.date-input:focus,.input-field:focus,.login-input:focus,.report-textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(86,179,232,0.12)}

@media(max-width:700px){.report-checks{grid-template-columns:1fr 1fr}}
@media(max-width:700px){
  .header{padding:16px 14px 14px}
  .header h1{font-size:16px;letter-spacing:-0.3px}
  .header .sub{font-size:9px}
  .refresh-btn{width:34px;height:34px;border-radius:8px}
  .tabs-wrap{padding:0;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:1px solid var(--bd);border-bottom:none;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tabs{width:100%;display:flex;border:none;border-radius:0;padding:0;gap:0;background:transparent;flex-wrap:nowrap}
  .tab-btn{flex:1;padding:10px 4px 8px;font-size:9px;white-space:nowrap;border-radius:0;text-align:center;min-width:0;flex-direction:column;gap:3px;letter-spacing:1px;align-items:center}
  .tab-btn.active{background:rgba(86,179,232,0.06)}
  .tab-btn.active::after{display:none}
  .tab-btn.active{border-top:2px solid var(--ac)}
  .tab-num{font-size:9px}
  .tab-btn.active{transform:none}
  .tab-btn:not(.active){opacity:0.85}
  .content{padding:12px 12px 80px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .kpi{padding:12px 14px;border-radius:10px}
  .kpi-label{font-size:8px;letter-spacing:1px;margin-bottom:4px}
  .kpi-value{font-size:15px}
  .filter-row{gap:6px;padding:8px 10px}
  .date-input{min-width:110px;padding:6px 8px;font-size:10px}
  .date-label{font-size:9px}
  .chart-box{padding:10px 6px 6px;border-radius:10px}
  .toggle-row{gap:10px;margin-top:8px}
  .toggle-item{font-size:10px;padding:4px 0}
  .perf-cards{grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .perf-card{padding:12px 14px;border-radius:10px}
  .perf-card .big{font-size:17px}
  .perf-card .label{font-size:8px;letter-spacing:1px}
  .perf-card .small{font-size:9px}

// ============================================

const DATA_URL    = `${SUPABASE_URL}/storage/v1/object/public/${DATA_BUCKET}/${DATA_FILE}`;

// Busca o arquivo de dados e preenche ALLDATA / rawData
async function loadData(){
  const res = await fetch(DATA_URL, { cache: 'no-store' });
  if(!res.ok) throw new Error('HTTP ' + res.status + ' ao buscar ' + DATA_FILE);
  const json = await res.json();
  if(!Array.isArray(json) || json.length === 0) throw new Error('Arquivo vazio ou em formato inválido');

  rawData = ALLDATA.map(r=>({date:r.d,k:r.k,c:r.c,i:r.i,s:r.s,q:r.q,a:r.a}));

}

let ALLDATA=[];

const MN=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

let rawData=[];

let currentTab="capa",cotaChart=null,barChart=null,sharpeChart=null,ddChart=null,plChart=null,excessChart=null,riskRetChart=null,varChart=null,investidoresUnlocked=false;

const fBRL=n=>n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fPct=n=>(n>=0?"+":"")+(n*100).toFixed(2).replace(".",",")+"%";
const fD=s=>{const[y,m,d]=s.split("-");return d+"/"+m+"/"+y};

function fullMonth(sm){const[ms,ys]=sm.split("/");return MN[MN_SHORT.indexOf(ms)]+"/20"+ys}

function filterByDates(){
  let f=rawData;
  if(dateFrom)f=f.filter(d=>d.date>=dateFrom);
  if(dateTo)f=f.filter(d=>d.date<=dateTo);
  return f.length>0?f:rawData;
}

function calcDynPerf(){
  const byMonth={};
  rawData.forEach(d=>{const k=d.date.slice(0,7);if(!byMonth[k]||d.date>byMonth[k].date)byMonth[k]={...d}});
  const keys=Object.keys(byMonth).sort();
  return keys.map((k,idx)=>{
    const d=byMonth[k];const[y,m]=k.split("-");const label=MN_SHORT[parseInt(m)-1]+"/"+y.slice(2);
    const rk=idx===0?((d.k/1)-1)*100:((d.k/byMonth[keys[idx-1]].k)-1)*100;
    const rc=idx===0?((d.c/1)-1)*100:((d.c/byMonth[keys[idx-1]].c)-1)*100;
    const ri=idx===0?((d.i/1)-1)*100:((d.i/byMonth[keys[idx-1]].i)-1)*100;
    const rs=idx===0?((d.s/1)-1)*100:((d.s/byMonth[keys[idx-1]].s)-1)*100;
    return{m:label,ck:d.k,cc:d.c,ci:d.i,cs:d.s,rk:Math.round(rk*100)/100,rc:Math.round(rc*100)/100,ri:Math.round(ri*100)/100,rs:Math.round(rs*100)/100}
  });
}

function calcAnnualReturns(dp){
  const byY={};dp.forEach(p=>{const y="20"+p.m.split("/")[1];if(!byY[y])byY[y]={last:p};else byY[y].last=p});
  const yrs=Object.keys(byY).sort();
  const lastDayByYear={};
  rawData.forEach(d=>{const y=d.date.slice(0,4);if(!lastDayByYear[y]||d.date>lastDayByYear[y].date)lastDayByYear[y]=d});
  return yrs.map((y,i)=>{
    let base;
    if(i===0){base=1}
    else{const prevY=String(parseInt(y)-1);base=lastDayByYear[prevY]?lastDayByYear[prevY].k:byY[yrs[i-1]].last.ck}
    const ret=((byY[y].last.ck/base)-1)*100;
    return{year:y,cota:byY[y].last.ck,ret:Math.round(ret*100)/100}
  });
}

function sampleWeekly(data){
  const result=[];let lastWeek="";
  data.forEach(d=>{
    const dt=new Date(d.date);const yr=dt.getFullYear();
    const jan1=new Date(yr,0,1);const wk=Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7);
    const key=yr+"-W"+wk;
    if(key!==lastWeek){result.push(d);lastWeek=key}else{result[result.length-1]=d}
  });
  return result;
}

// ============================================================

const C={ac:"#56b3e8",ac2:"#8bc9f0",cdi:"#fbbf24",ibov:"#f87171",sp:"#a78bfa",grn:"#22c55e",red:"#ef4444",tx:"#C8CCD2",tx2:"#97a2b4",tx3:"#79859a",tx4:"#6b7689",grid:"rgba(255,255,255,0.045)"};

// ---- Builders de marcação (espelham o helper kpi) ----
function kpi(l,v){return`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-value">${v}</div></div>`}

// ---- Fábrica de opções do Chart.js ----
// base = scaffolding comum (responsive, cores/fontes dos eixos, grids).
// extra = bits específicos de cada gráfico, mesclados por cima (deep-merge).
function dmerge(a,b){for(const k in b){const v=b[k];if(v&&typeof v==="object"&&!Array.isArray(v)){a[k]=dmerge(a[k]&&typeof a[k]==="object"?a[k]:{},v)}else{a[k]=v}}return a}
function baseOpts(extra){
  const base={
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{display:false},

      y:{ticks:{color:C.tx4,font:{size:9,family:MONO}},grid:{display:false},border:{display:false}}
    }
  };
  return extra?dmerge(base,extra):base;
}
function legendLabels(filter){return{color:C.tx2,font:{size:10,family:MONO},boxWidth:12,...(filter?{filter}:{})}}

// ============================================================
//  CONTROLE DE ABAS — render preguiçoso + ARIA + animação
// ============================================================
const TABS=["capa","performance","indicadores","cotistas","relatorio"];
const rendered=new Set();
const renderers={capa:renderCapa,performance:renderPerformance,indicadores:renderIndicadores,cotistas:renderCotistas,relatorio:renderRelatorio};
function renderTab(t){(renderers[t]||(()=>{}))();rendered.add(t)}

function showTab(t){
  currentTab=t;
  TABS.forEach(id=>{
    const on=id===t;
    document.getElementById("tab-"+id).classList.toggle("hidden",!on);
    const btn=document.getElementById("tabbtn-"+id);
    if(btn){btn.classList.toggle("active",on);btn.setAttribute("aria-selected",on?"true":"false");btn.tabIndex=on?0:-1}
  });
  if(!rendered.has(t))renderTab(t);            // constrói só na primeira visita, com o container já visível
  const panel=document.getElementById("tab-"+t); // re-dispara a animação de entrada
  panel.classList.remove("fade-in");void panel.offsetWidth;panel.classList.add("fade-in");
}

// Navegação por seta/Home/End entre as abas (padrão WAI-ARIA tabs)
function tabKey(e){
  const i=TABS.indexOf(currentTab);let n=null;
  if(e.key==="ArrowRight"||e.key==="ArrowDown")n=(i+1)%TABS.length;
  else if(e.key==="ArrowLeft"||e.key==="ArrowUp")n=(i-1+TABS.length)%TABS.length;
  else if(e.key==="Home")n=0;else if(e.key==="End")n=TABS.length-1;
  if(n!==null){e.preventDefault();showTab(TABS[n]);document.getElementById("tabbtn-"+TABS[n]).focus()}
}

    if(showCDI)ds.push({label:"CDI",data:normC,borderColor:C.cdi,fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,2]});
    if(showIbov)ds.push({label:"Ibovespa",data:normI,borderColor:C.ibov,fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,2]});
    if(showSP)ds.push({label:"S&P500 (BRL)",data:normS,borderColor:C.sp,fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,2]});
    cotaChart=new Chart(ctx,{type:"line",data:{labels:filtered.map(d=>d.date),datasets:ds},options:baseOpts({
      interaction:{mode:"index",intersect:false},
      plugins:{tooltip:{mode:"index",intersect:false,callbacks:{title:items=>fD(filtered[items[0].dataIndex].date),label:c=>{const ret=((c.parsed.y-1)*100).toFixed(2);return c.dataset.label+": "+c.parsed.y.toFixed(6)+" ("+(ret>=0?"+":"")+ret+"%)"}}}},
      scales:{x:{ticks:{maxTicksLimit:10,callback:function(v,i){const d=filtered[i];if(!d)return"";const[y,m]=d.date.split("-");return MN_SHORT[parseInt(m)-1]+"/"+y.slice(2)}}},y:{min:yMin,max:yMax,ticks:{callback:v=>v.toFixed(2)}}}
    })})})}

  h+=`</tbody></table></div></div>`;document.getElementById("tab-performance").innerHTML=h;
  requestAnimationFrame(()=>{const ctx=document.getElementById("barChart");if(!ctx)return;if(barChart)barChart.destroy();barChart=new Chart(ctx,{type:"bar",data:{labels:dp.map(d=>d.m),datasets:[{data:dp.map(d=>d.rk),backgroundColor:dp.map(d=>d.rk>=0?C.grn:C.red),borderRadius:3,barPercentage:0.7}]},options:baseOpts({
    plugins:{tooltip:{callbacks:{label:c=>(c.parsed.y>=0?"+":"")+c.parsed.y.toFixed(2)+"%"}}},
    scales:{x:{ticks:{color:"#707a8a",maxRotation:45}},y:{ticks:{color:C.tx3,callback:v=>v.toFixed(0)+"%"},grid:{display:false}}}

function renderIndicadores(){
  const indCard=(title,id,label)=>`<div class="ind-card"><h4>${title}</h4><div class="chart-h-sm"><canvas id="${id}" role="img" aria-label="${label.replace(/"/g,"&quot;")}"></canvas></div></div>`;
  let h=sectionTitle("Indicadores de Performance")+`<div id="perfMetrics" style="margin-bottom:28px"></div>`;
  h+=sectionTitle("Gráficos")+`<div class="ind-grid">`;
  h+=indCard("Risco × Retorno","riskRetChart","Dispersão de volatilidade anualizada por retorno anualizado de Konstan, CDI, Ibovespa e S&P 500");
  h+=indCard("Distribuição dos Retornos Diários","varChart","Histograma da frequência dos retornos diários da cota Konstan");
  h+=indCard("Índice Sharpe (12M)","sharpeChart","Índice de Sharpe móvel de 12 meses de Konstan, Ibovespa e S&P 500");
  h+=indCard("Drawdown","ddChart","Drawdown ao longo do tempo de Konstan, Ibovespa e S&P 500");
  h+=indCard("Patrimônio × Aportes Acumulados","plChart","Patrimônio líquido comparado aos aportes acumulados ao longo do tempo");
  h+=indCard("Excess Return","excessChart","Retorno excedente aproximado da Konstan em reais frente a Ibovespa, CDI e S&P 500");
  h+=`</div>`;
  document.getElementById("tab-indicadores").innerHTML=h;

  requestAnimationFrame(()=>{
    // --- Monthly returns for Sharpe, Vol, Risk x Return ---
    const byMonth={};rawData.forEach(d=>{const k=d.date.slice(0,7);if(!byMonth[k]||d.date>byMonth[k].date)byMonth[k]={...d}});
    const mKeys=Object.keys(byMonth).sort();
    const mRetK=[],mRetC=[],mRetI=[],mRetS=[];
    for(let i=1;i<mKeys.length;i++){const p=byMonth[mKeys[i-1]],c=byMonth[mKeys[i]];mRetK.push(c.k/p.k-1);mRetC.push(c.c/p.c-1);mRetI.push(c.i/p.i-1);mRetS.push(c.s/p.s-1)}

    function rollSharpe(rets,rfRets,w){
      const out=[];for(let i=0;i<rets.length;i++){
        if(i<w-1){out.push(null);continue}
        const r=rets.slice(i-w+1,i+1),rf=rfRets.slice(i-w+1,i+1);
        const exc=r.map((v,j)=>v-rf[j]);const mean=exc.reduce((a,b)=>a+b,0)/exc.length;
        const std=Math.sqrt(exc.reduce((a,b)=>a+(b-mean)**2,0)/(exc.length-1));
        out.push(std>0?(mean/std)*Math.sqrt(12):0)
      }return out
    }

    // --- SHARPE ---
    const sK=rollSharpe(mRetK,mRetC,12),sI=rollSharpe(mRetI,mRetC,12),sS=rollSharpe(mRetS,mRetC,12);
    const sLabels=mKeys.slice(1).map(k=>{const[y,m]=k.split("-");return MN_SHORT[parseInt(m)-1]+"/"+y.slice(2)});
    const ctx1=document.getElementById("sharpeChart");
    if(ctx1){if(sharpeChart)sharpeChart.destroy();
      sharpeChart=new Chart(ctx1,{type:"line",data:{labels:sLabels,datasets:[
        {label:"Konstan",data:sK,borderColor:C.ac,borderWidth:2,pointRadius:0,tension:0.3},
        {label:"Ibovespa",data:sI,borderColor:C.ibov,borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[4,2]},
        {label:"S&P500",data:sS,borderColor:C.sp,borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[4,2]}
      ]},options:baseOpts({interaction:{mode:"index",intersect:false},plugins:{legend:{display:true,labels:legendLabels()},tooltip:{mode:"index",intersect:false,callbacks:{label:c=>c.dataset.label+": "+(c.parsed.y!==null?c.parsed.y.toFixed(3):"—")}}},scales:{x:{ticks:{maxTicksLimit:8}},y:{ticks:{callback:v=>v.toFixed(1)}}}})})
    }

    // --- DRAWDOWN ---
    const ddK=[],ddI=[],ddS=[];let peakK=rawData[0].k,peakI=rawData[0].i,peakS=rawData[0].s;
    rawData.forEach(d=>{
      if(d.k>peakK)peakK=d.k;ddK.push(-((peakK-d.k)/peakK)*100);
      if(d.i>peakI)peakI=d.i;ddI.push(-((peakI-d.i)/peakI)*100);
      if(d.s>peakS)peakS=d.s;ddS.push(-((peakS-d.s)/peakS)*100);
    });
    const ctx2=document.getElementById("ddChart");
    if(ctx2){if(ddChart)ddChart.destroy();
      ddChart=new Chart(ctx2,{type:"line",data:{labels:rawData.map(d=>d.date),datasets:[
        {label:"Konstan",data:ddK,borderColor:C.ac,backgroundColor:"rgba(86,179,232,0.06)",fill:true,pointRadius:0,tension:0.3,borderWidth:2},
        {label:"Ibovespa",data:ddI,borderColor:C.ibov,fill:false,pointRadius:0,tension:0.3,borderWidth:1.5,borderDash:[4,2]},
        {label:"S&P500 (BRL)",data:ddS,borderColor:C.sp,fill:false,pointRadius:0,tension:0.3,borderWidth:1.5,borderDash:[4,2]}
      ]},options:baseOpts({interaction:{mode:"index",intersect:false},plugins:{legend:{display:true,labels:legendLabels()},tooltip:{mode:"index",intersect:false,callbacks:{title:items=>fD(rawData[items[0].dataIndex].date),label:c=>c.dataset.label+": "+c.parsed.y.toFixed(2)+"%"}}},scales:{x:{ticks:{maxTicksLimit:8,callback:function(v,i){const d=rawData[i];if(!d)return"";const[y,m]=d.date.split("-");return MN_SHORT[parseInt(m)-1]+"/"+y.slice(2)}}},y:{ticks:{callback:v=>v.toFixed(0)+"%"}}}})})
    }

    // --- DAILY RETURNS (used by Risk x Return and Volatility) ---
    const dRetK=[],dRetC=[],dRetI=[],dRetS=[];
    for(let i=1;i<rawData.length;i++){dRetK.push(rawData[i].k/rawData[i-1].k-1);dRetC.push(rawData[i].c/rawData[i-1].c-1);dRetI.push(rawData[i].i/rawData[i-1].i-1);dRetS.push(rawData[i].s/rawData[i-1].s-1)}

    // --- RISCO x RETORNO (scatter, daily-based vol) ---
    const last=getLast();const nMonths=mRetK.length;
    const annRetK=((last.k/1)**(12/nMonths)-1)*100;
    const annRetC=((last.c/1)**(12/nMonths)-1)*100;
    const annRetI=((last.i/1)**(12/nMonths)-1)*100;
    const annRetS=((last.s/1)**(12/nMonths)-1)*100;
    function fullVol(dRets){const n=dRets.length;const mean=dRets.reduce((a,b)=>a+b,0)/n;return Math.sqrt(dRets.reduce((a,b)=>a+(b-mean)**2,0)/(n-1))*Math.sqrt(252)*100}
    const volK_full=fullVol(dRetK),volC_full=fullVol(dRetC),volI_full=fullVol(dRetI),volS_full=fullVol(dRetS);
    // Downside Deviation anualizado — MAR=0, denominador = nº de dias negativos apenas
    function ddNeg(dRets){let s=0,n=0;dRets.forEach(r=>{if(r<0){s+=r*r;n++}});return n>0?Math.sqrt(s/n)*Math.sqrt(252)*100:0}
    const ddK_neg=ddNeg(dRetK),ddC_neg=ddNeg(dRetC),ddI_neg=ddNeg(dRetI),ddS_neg=ddNeg(dRetS);
    const ctx5=document.getElementById("riskRetChart");
    if(ctx5){if(riskRetChart)riskRetChart.destroy();
      // SML: linha 45° a partir do CDI (risk-free); x=risco(DD) embaixo, y=retorno
      const allDDs=[ddK_neg,ddC_neg,ddI_neg,ddS_neg];
      const smlMaxX=Math.max(...allDDs)*1.1;
      const smlPoints=[{x:0,y:annRetC},{x:smlMaxX,y:annRetC+smlMaxX}];
      riskRetChart=new Chart(ctx5,{
        type:"scatter",
        data:{datasets:[
          {label:"SML",data:smlPoints,type:"line",borderColor:"rgba(255,255,255,0.35)",borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false,tension:0},
          {label:"Konstan",data:[{x:ddK_neg,y:annRetK}],backgroundColor:"rgba(86,179,232,0.9)",borderColor:C.ac,pointRadius:5,pointHoverRadius:7},
          {label:"CDI",data:[{x:ddC_neg,y:annRetC}],backgroundColor:"rgba(251,191,36,0.9)",borderColor:C.cdi,pointRadius:5,pointHoverRadius:7},
          {label:"Ibovespa",data:[{x:ddI_neg,y:annRetI}],backgroundColor:"rgba(248,113,113,0.9)",borderColor:C.ibov,pointRadius:5,pointHoverRadius:7},
          {label:"S&P500 (BRL)",data:[{x:ddS_neg,y:annRetS}],backgroundColor:"rgba(167,139,250,0.9)",borderColor:C.sp,pointRadius:5,pointHoverRadius:7}
        ]},
        options:baseOpts({
          plugins:{
            legend:{display:true,labels:legendLabels(item=>item.text!=="SML")},
            tooltip:{filter:item=>item.dataset.label!=="SML",callbacks:{label:c=>c.dataset.label+": DD "+c.parsed.x.toFixed(1)+"% | Ret "+c.parsed.y.toFixed(1)+"%"}}
          },
          scales:{
            x:{min:0,title:{display:true,text:"Downside Deviation (%)",color:C.tx3,font:{size:10,family:MONO}},ticks:{font:{size:9},callback:v=>v.toFixed(0)+"%"}},
            y:{min:0,title:{display:true,text:"Retorno Anualizado (%)",color:C.tx3,font:{size:10,family:MONO}},ticks:{callback:v=>v.toFixed(0)+"%"}}
          }
        })
      })
    }

    // --- DISTRIBUIÇÃO DOS RETORNOS DIÁRIOS (histograma) ---
    const binWidth=0.25;
    const minBin=-4.50,maxBin=4.50;
    function buildHist(rets){
      const data=rets.map(r=>r*100);
      const bins=[];
      bins.push(0);
      for(let b=minBin;b<maxBin;b=Math.round((b+binWidth)*100)/100){bins.push(0)}
      bins.push(0);
      data.forEach(r=>{
        if(r<=minBin){bins[0]++}
        else if(r>=maxBin){bins[bins.length-1]++}
        else{const idx=Math.floor((r-minBin)/binWidth)+1;if(idx>=1&&idx<bins.length-1)bins[idx]++}
      });
      return bins;
    }
    const histK=buildHist(dRetK),histI=buildHist(dRetI),histS=buildHist(dRetS);
    const histLabels=[];
    histLabels.push("≤-4,50");
    for(let b=minBin;b<maxBin;b=Math.round((b+binWidth)*100)/100){histLabels.push(b.toFixed(2).replace(".",","))}
    histLabels.push("≥4,50");
    const ctx6=document.getElementById("varChart");
    if(ctx6){if(varChart)varChart.destroy();
      varChart=new Chart(ctx6,{type:"bar",data:{labels:histLabels.map(b=>b+"%"),datasets:[
        {label:"Konstan",data:histK,backgroundColor:"rgba(86,179,232,0.7)",borderWidth:0,borderRadius:1,barPercentage:1,categoryPercentage:1}
      ]},options:baseOpts({plugins:{legend:{display:true,labels:legendLabels()},tooltip:{mode:"index",intersect:false,callbacks:{title:items=>{const i=items[0].dataIndex;if(i===0)return"≤ -4,50%";if(i===histK.length-1)return"≥ 4,50%";const start=minBin+(i-1)*binWidth;return start.toFixed(2)+"% a "+(start+binWidth).toFixed(2)+"%"},label:c=>c.dataset.label+": "+c.parsed.y+" dias"}}},scales:{x:{ticks:{font:{size:7},maxTicksLimit:12,maxRotation:0}}}})})
    }

    // --- PL + APORTES + RESULTADO ACUMULADO (weekly) ---
    const weeklyData=sampleWeekly(rawData);
    const plLabels=weeklyData.map(d=>{const[y,m]=d.date.split("-");return MN_SHORT[parseInt(m)-1]+"/"+y.slice(2)});
    const ctx3=document.getElementById("plChart");
    if(ctx3){if(plChart)plChart.destroy();
      plChart=new Chart(ctx3,{type:"line",data:{labels:plLabels,datasets:[
        {label:"Patrimônio Líquido",data:weeklyData.map(d=>d.q*d.k),borderColor:C.ac,backgroundColor:"rgba(86,179,232,0.08)",fill:true,pointRadius:0,tension:0.3,borderWidth:2},
        {label:"Aportes Acumulados",data:weeklyData.map(d=>d.a),borderColor:C.cdi,fill:false,pointRadius:0,tension:0,borderWidth:1.5,borderDash:[6,3]}
      ]},options:baseOpts({interaction:{mode:"index",intersect:false},plugins:{legend:{display:true,labels:legendLabels()},tooltip:{mode:"index",intersect:false,callbacks:{title:items=>fD(weeklyData[items[0].dataIndex].date),label:c=>c.dataset.label+": "+fBRL(c.parsed.y)}}},scales:{x:{ticks:{maxTicksLimit:8}},y:{ticks:{callback:v=>"R$ "+(v/1000).toFixed(0)+"k"}}}})})
    }

    // --- EXCESS RETURN vs IBOVESPA & CDI (weekly line chart) ---
    const exLabels=weeklyData.map(d=>{const[y,m]=d.date.split("-");return MN_SHORT[parseInt(m)-1]+"/"+y.slice(2)});
    const exVsIbov=weeklyData.map(d=>(d.k-d.i)*d.q);
    const exVsCDI=weeklyData.map(d=>(d.k-d.c)*d.q);
    const exVsSP=weeklyData.map(d=>(d.k-d.s)*d.q);
    const ctx4=document.getElementById("excessChart");
    if(ctx4){if(excessChart)excessChart.destroy();
      excessChart=new Chart(ctx4,{type:"line",data:{labels:exLabels,datasets:[
        {label:"vs Ibovespa",data:exVsIbov,borderColor:C.ibov,backgroundColor:"rgba(248,113,113,0.07)",fill:true,pointRadius:0,tension:0.3,borderWidth:2},
        {label:"vs CDI",data:exVsCDI,borderColor:C.cdi,backgroundColor:"rgba(251,191,36,0.07)",fill:true,pointRadius:0,tension:0.3,borderWidth:1.5,borderDash:[4,2]},
        {label:"vs S&P500 (BRL)",data:exVsSP,borderColor:C.sp,backgroundColor:"rgba(167,139,250,0.07)",fill:true,pointRadius:0,tension:0.3,borderWidth:1.5,borderDash:[4,2]}
      ]},options:baseOpts({interaction:{mode:"index",intersect:false},plugins:{legend:{display:true,labels:legendLabels()},tooltip:{mode:"index",intersect:false,callbacks:{title:items=>fD(weeklyData[items[0].dataIndex].date),label:c=>c.dataset.label+": "+fBRL(c.parsed.y)}}},scales:{x:{ticks:{maxTicksLimit:8}},y:{ticks:{callback:v=>"R$"+(Math.abs(v)>=1000000?(v/1000000).toFixed(1)+"M":(v/1000).toFixed(0)+"k")}}}})})
    }

    // --- INDICADORES DE PERFORMANCE (tabela resumo) ---
    {
      const rf=annRetC;
      const pmDowns=a=>{let s=0;a.forEach(r=>{const m=r<0?r:0;s+=m*m});return Math.sqrt(s/a.length)*Math.sqrt(252)*100};
      const pmMdd=f=>{let pk=-Infinity,m=0;rawData.forEach(d=>{const v=d[f];if(v>pk)pk=v;const x=(v-pk)/pk;if(x<m)m=x});return m*100};
      const pmSh=(ar,vol)=>vol>0.1?(ar-rf)/vol:"—";
      const pmSo=(ar,a)=>{const d=pmDowns(a);return d>0.1?(ar-rf)/d:"—"};
      const pmRows=[
        {l:"Retorno acumulado",t:"pct",v:[(last.k-1)*100,(last.c-1)*100,(last.i-1)*100,(last.s-1)*100]},
        {l:"Retorno anualizado",t:"pct",v:[annRetK,annRetC,annRetI,annRetS]},
        {l:"Downside Deviation (a.a.)",t:"vol",v:[ddK_neg,ddC_neg,ddI_neg,ddS_neg]},
        {l:"Índice de Sharpe",t:"num",v:[pmSh(annRetK,volK_full),"—",pmSh(annRetI,volI_full),pmSh(annRetS,volS_full)]},
        {l:"Índice de Sortino",t:"num",v:[pmSo(annRetK,dRetK),"—",pmSo(annRetI,dRetI),pmSo(annRetS,dRetS)]},
        {l:"Máx. drawdown",t:"dd",v:[pmMdd("k"),"—",pmMdd("i"),pmMdd("s")]}
      ];
      const pmF=n=>n.toFixed(2).replace(".",",");
      const pmCell=(x,t,kon)=>{const w=kon?";font-weight:700":"";
        if(x==="—")return`<td style="text-align:right;color:var(--tx3)${w}">—</td>`;
        if(t==="pct")return`<td style="text-align:right;color:${x>=0?"var(--grn)":"var(--red)"}${w}">${(x>=0?"+":"")+pmF(x)}%</td>`;
        if(t==="vol")return`<td style="text-align:right;color:var(--tx)${w}">${pmF(x)}%</td>`;
        if(t==="dd")return`<td style="text-align:right;color:var(--red)${w}">${pmF(x)}%</td>`;
        return`<td style="text-align:right;color:var(--tx)${w}">${pmF(x)}</td>`};
      let pmH=`<div style="background:var(--card);border-radius:16px;border:1px solid var(--bd);overflow:hidden"><div style="overflow-x:auto"><table class="data-table"><thead><tr><th style="text-align:left">Métrica</th><th style="text-align:right;color:var(--ac)">Konstan</th><th style="text-align:right">CDI</th><th style="text-align:right">Ibovespa</th><th style="text-align:right">S&P500</th></tr></thead><tbody>`;
      pmRows.forEach(r=>{pmH+=`<tr><td style="text-align:left;color:var(--tx2)">${r.l}</td>`+r.v.map((x,i)=>pmCell(x,r.t,i===0)).join("")+`</tr>`});
      pmH+=`</tbody></table></div></div>`;
      const pmEl=document.getElementById("perfMetrics");if(pmEl)pmEl.innerHTML=pmH;
    }
  });
}

async function exportXLSX(){
  if(typeof ExcelJS==="undefined"){alert("A biblioteca de planilha ainda está carregando. Tente novamente em alguns segundos.");return}
  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet("ALLDATA");
  ws.addRow(["Data","Cota Konstan","CDI","Ibovespa","S&P500 (BRL)","Cotas","Aportes Acumulados"]);
  ALLDATA.forEach(d=>{
    const p=d.d.split("-");
    ws.addRow([new Date(+p[0],+p[1]-1,+p[2]),d.k,d.c,d.i,d.s,d.q,d.a]);
  });
  ws.columns=[{width:12},{width:14},{width:10},{width:10},{width:14},{width:14},{width:18}];
  ws.getColumn(1).numFmt="dd/mm/yyyy";
  ws.eachRow(row=>{row.eachCell(cell=>{cell.font={name:"Calibri",size:11}})});
  ws.getRow(1).eachCell(cell=>{cell.font={name:"Calibri",size:11,bold:true}});
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="konstan_alldata.xlsx";document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

function exportPDF(){
  reportComment=document.getElementById("reportComment")?.value||"";
  reportTitle=document.getElementById("reportTitle")?.value||reportTitle;

  // Exige sessão autenticada quando a seção Investidores estiver marcada
  if(reportSections.investidores && !investidoresUnlocked){
    alert("Sessão não autenticada. Desbloqueie a aba \"Investidores\" com seu login antes de exportar o relatório com essa seção.");
    return;
  }

  // Container oculto para charts temporários
  const tmpDiv=document.createElement("div");
  tmpDiv.style.cssText="position:absolute;left:-9999px;top:0;width:700px;";
  document.body.appendChild(tmpDiv);

  const last=getLast(),cur=last.k,tc=getTotalCotas(),ta=getTotalAportes(),pl=tc*cur,lb=pl-ta,ll=lb*0.85;

  // ============================================================
  // PRÉ-CÁLCULOS
  // ============================================================

  // Retornos mensais
  const byMo={};rawData.forEach(d=>{const k=d.date.slice(0,7);if(!byMo[k]||d.date>byMo[k].date)byMo[k]={...d}});
  const moKeys=Object.keys(byMo).sort();
  const mrK=[],mrC=[],mrI=[],mrS=[];
  for(let i=1;i<moKeys.length;i++){const p=byMo[moKeys[i-1]],c=byMo[moKeys[i]];mrK.push(c.k/p.k-1);mrC.push(c.c/p.c-1);mrI.push(c.i/p.i-1);mrS.push(c.s/p.s-1)}
  const nMo=mrK.length;
  const aRK=((last.k)**(12/nMo)-1)*100,aRC=((last.c)**(12/nMo)-1)*100,aRI=((last.i)**(12/nMo)-1)*100,aRS=((last.s)**(12/nMo)-1)*100;

  // Retornos diários
  const drK=[],drC=[],drI=[],drS=[];
  for(let i=1;i<rawData.length;i++){drK.push(rawData[i].k/rawData[i-1].k-1);drC.push(rawData[i].c/rawData[i-1].c-1);drI.push(rawData[i].i/rawData[i-1].i-1);drS.push(rawData[i].s/rawData[i-1].s-1)}
  function fV(r){const n=r.length,m=r.reduce((a,b)=>a+b,0)/n;return Math.sqrt(r.reduce((a,b)=>a+(b-m)**2,0)/(n-1))*Math.sqrt(252)*100}
  const vK=fV(drK),vC=fV(drC),vI=fV(drI),vS=fV(drS);
  function fDDn(r){let s=0,n=0;r.forEach(x=>{if(x<0){s+=x*x;n++}});return n>0?Math.sqrt(s/n)*Math.sqrt(252)*100:0}
  const ddK2=fDDn(drK),ddC2=fDDn(drC),ddI2=fDDn(drI),ddS2=fDDn(drS);

  const wkData=sampleWeekly(rawData);
  const wkLabels=wkData.map(d=>{const[y,m]=d.date.split("-");return MN_SHORT[parseInt(m)-1]+"/"+y.slice(2)});
  const dp=calcDynPerf();

  // Charts a renderizar — sempre num formato consistente (700x350)
  const charts=[];
  const W=700, H=350;

  // Helper para criar canvas em sequência
  function mkCanvas(){const c=document.createElement("canvas");c.width=W;c.height=H;tmpDiv.appendChild(c);return c}

  // Opções base de gráficos para PDF (fundo branco, cores escuras)
  const baseOpts={responsive:false,animation:false,plugins:{legend:{display:true,labels:{color:"#333",font:{size:10},boxWidth:10}},tooltip:{enabled:false}},scales:{x:{ticks:{color:"#666",font:{size:9}},grid:{display:false}},y:{ticks:{color:"#666",font:{size:9}},grid:{display:false}}}};

  // 1) Evolução das Cotas (linha normalizada)
  const c1=mkCanvas();
  const baseK=rawData[0].k,baseC=rawData[0].c,baseI=rawData[0].i,baseS=rawData[0].s;
  charts.push(new Chart(c1,{type:"line",data:{labels:rawData.map(d=>d.date),datasets:[
    {label:"Konstan",data:rawData.map(d=>d.k/baseK),borderColor:"#56b3e8",backgroundColor:"rgba(86,179,232,0.08)",fill:true,tension:0.3,pointRadius:0,borderWidth:2},
    {label:"CDI",data:rawData.map(d=>d.c/baseC),borderColor:"#fbbf24",fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,2]},
    {label:"Ibovespa",data:rawData.map(d=>d.i/baseI),borderColor:"#f87171",fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,2]},
    {label:"S&P500 (BRL)",data:rawData.map(d=>d.s/baseS),borderColor:"#a78bfa",fill:false,tension:0.3,pointRadius:0,borderWidth:1.5,borderDash:[4,2]}
  ]},options:{...baseOpts,scales:{x:{ticks:{color:"#666",font:{size:8},maxTicksLimit:10,callback:function(v,i){const d=rawData[i];if(!d)return"";const[y,m]=d.date.split("-");return MN_SHORT[parseInt(m)-1]+"/"+y.slice(2)}},grid:{display:false}},y:{ticks:{color:"#666",font:{size:9},callback:v=>v.toFixed(2)},grid:{display:false}}}}}));

  // 2) Retornos Mensais (barras)
  const c2=mkCanvas();
  charts.push(new Chart(c2,{type:"bar",data:{labels:dp.map(d=>d.m),datasets:[
    {label:"Konstan",data:dp.map(d=>d.rk),backgroundColor:dp.map(d=>d.rk>=0?"#22c55e":"#ef4444"),borderRadius:3,barPercentage:0.7}
  ]},options:{...baseOpts,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{ticks:{color:"#666",font:{size:8},maxRotation:45,maxTicksLimit:18},grid:{display:false}},y:{ticks:{color:"#666",font:{size:9},callback:v=>v.toFixed(0)+"%"},grid:{display:false}}}}}));

  // 3) Risco × Retorno
  const c3=mkCanvas();
  const allV=[ddK2,ddC2,ddI2,ddS2];const smlMX=Math.max(...allV)*1.1;
  const smlPts=[{x:0,y:aRC},{x:smlMX,y:aRC+smlMX}];
  charts.push(new Chart(c3,{type:"scatter",data:{datasets:[
    {label:"SML",data:smlPts,type:"line",borderColor:"rgba(100,100,100,0.3)",borderWidth:1,borderDash:[6,4],pointRadius:0,fill:false,tension:0},
    {label:"Konstan",data:[{x:ddK2,y:aRK}],backgroundColor:"#56b3e8",borderColor:"#56b3e8",pointRadius:6},
    {label:"CDI",data:[{x:ddC2,y:aRC}],backgroundColor:"#fbbf24",borderColor:"#fbbf24",pointRadius:6},
    {label:"Ibovespa",data:[{x:ddI2,y:aRI}],backgroundColor:"#f87171",borderColor:"#f87171",pointRadius:6},
    {label:"S&P500",data:[{x:ddS2,y:aRS}],backgroundColor:"#a78bfa",borderColor:"#a78bfa",pointRadius:6}
  ]},options:{responsive:false,animation:false,plugins:{legend:{display:true,labels:{color:"#333",font:{size:10},boxWidth:10,filter:item=>item.text!=="SML"}},tooltip:{enabled:false}},scales:{x:{min:0,title:{display:true,text:"Downside Deviation (%)",color:"#666",font:{size:10}},ticks:{color:"#666",font:{size:9},callback:v=>v.toFixed(0)+"%"},grid:{display:false}},y:{min:0,title:{display:true,text:"Retorno Anualizado (%)",color:"#666",font:{size:10}},ticks:{color:"#666",font:{size:9},callback:v=>v.toFixed(0)+"%"},grid:{display:false}}}}}));

  // 4) Distribuição dos Retornos Diários (histograma)
  const c4=mkCanvas();
  const binWidth=0.25,minBin=-4.50,maxBin=4.50;
  function buildHist(rets){
    const data=rets.map(r=>r*100);const bins=[];bins.push(0);
    for(let b=minBin;b<maxBin;b=Math.round((b+binWidth)*100)/100){bins.push(0)}
    bins.push(0);
    data.forEach(r=>{
      if(r<=minBin){bins[0]++}else if(r>=maxBin){bins[bins.length-1]++}
      else{const idx=Math.floor((r-minBin)/binWidth)+1;if(idx>=1&&idx<bins.length-1)bins[idx]++}
    });
    return bins;
  }
  const histK=buildHist(drK);const histLabels=[];histLabels.push("≤-4,50");
  for(let b=minBin;b<maxBin;b=Math.round((b+binWidth)*100)/100){histLabels.push(b.toFixed(2).replace(".",","))}
  histLabels.push("≥4,50");
  charts.push(new Chart(c4,{type:"bar",data:{labels:histLabels.map(b=>b+"%"),datasets:[
    {label:"Konstan",data:histK,backgroundColor:"rgba(86,179,232,0.7)",borderWidth:0,borderRadius:1,barPercentage:1,categoryPercentage:1}
  ]},options:{...baseOpts,scales:{x:{ticks:{color:"#666",font:{size:7},maxTicksLimit:14,maxRotation:0},grid:{display:false}},y:{ticks:{color:"#666",font:{size:9}},grid:{display:false}}}}}));

  // 5) Índice Sharpe (12M)
  const c5=mkCanvas();
  function rollSharpe(rets,rfRets,w){
    const out=[];for(let i=0;i<rets.length;i++){
      if(i<w-1){out.push(null);continue}
      const r=rets.slice(i-w+1,i+1),rf=rfRets.slice(i-w+1,i+1);
      const exc=r.map((v,j)=>v-rf[j]);const mean=exc.reduce((a,b)=>a+b,0)/exc.length;
      const std=Math.sqrt(exc.reduce((a,b)=>a+(b-mean)**2,0)/(exc.length-1));
      out.push(std>0?(mean/std)*Math.sqrt(12):0)
    }return out
  }
  const sK=rollSharpe(mrK,mrC,12),sI=rollSharpe(mrI,mrC,12),sS=rollSharpe(mrS,mrC,12);
  const sLabels=moKeys.slice(1).map(k=>{const[y,m]=k.split("-");return MN_SHORT[parseInt(m)-1]+"/"+y.slice(2)});
  charts.push(new Chart(c5,{type:"line",data:{labels:sLabels,datasets:[
    {label:"Konstan",data:sK,borderColor:"#56b3e8",borderWidth:2,pointRadius:0,tension:0.3,fill:false},
    {label:"Ibovespa",data:sI,borderColor:"#f87171",borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[4,2],fill:false},
    {label:"S&P500",data:sS,borderColor:"#a78bfa",borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[4,2],fill:false}
  ]},options:{...baseOpts,scales:{x:{ticks:{color:"#666",font:{size:8},maxTicksLimit:10},grid:{display:false}},y:{ticks:{color:"#666",font:{size:9},callback:v=>v.toFixed(1)},grid:{display:false}}}}}));

  // 6) Drawdown
  const c6=mkCanvas();
  const ddK=[],ddI=[],ddS=[];let peakK=rawData[0].k,peakI=rawData[0].i,peakS=rawData[0].s;
  rawData.forEach(d=>{
    if(d.k>peakK)peakK=d.k;ddK.push(-((peakK-d.k)/peakK)*100);
    if(d.i>peakI)peakI=d.i;ddI.push(-((peakI-d.i)/peakI)*100);
    if(d.s>peakS)peakS=d.s;ddS.push(-((peakS-d.s)/peakS)*100);
  });
  charts.push(new Chart(c6,{type:"line",data:{labels:rawData.map(d=>d.date),datasets:[
    {label:"Konstan",data:ddK,borderColor:"#56b3e8",backgroundColor:"rgba(86,179,232,0.08)",fill:true,pointRadius:0,tension:0.3,borderWidth:2},
    {label:"Ibovespa",data:ddI,borderColor:"#f87171",fill:false,pointRadius:0,tension:0.3,borderWidth:1.5,borderDash:[4,2]},
    {label:"S&P500 (BRL)",data:ddS,borderColor:"#a78bfa",fill:false,pointRadius:0,tension:0.3,borderWidth:1.5,borderDash:[4,2]}
  ]},options:{...baseOpts,scales:{x:{ticks:{color:"#666",font:{size:8},maxTicksLimit:10,callback:function(v,i){const d=rawData[i];if(!d)return"";const[y,m]=d.date.split("-");return MN_SHORT[parseInt(m)-1]+"/"+y.slice(2)}},grid:{display:false}},y:{ticks:{color:"#666",font:{size:9},callback:v=>v.toFixed(0)+"%"},grid:{display:false}}}}}));

  // 7) Patrimônio × Aportes
  const c7=mkCanvas();
  charts.push(new Chart(c7,{type:"line",data:{labels:wkLabels,datasets:[
    {label:"Patrimônio Líquido",data:wkData.map(d=>d.q*d.k),borderColor:"#56b3e8",backgroundColor:"rgba(86,179,232,0.08)",fill:true,pointRadius:0,tension:0.3,borderWidth:2},
    {label:"Aportes Acumulados",data:wkData.map(d=>d.a),borderColor:"#fbbf24",fill:false,pointRadius:0,tension:0,borderWidth:1.5,borderDash:[6,3]}
  ]},options:{...baseOpts,scales:{x:{ticks:{color:"#666",font:{size:8},maxTicksLimit:10},grid:{display:false}},y:{ticks:{color:"#666",font:{size:9},callback:v=>"R$ "+(v/1000).toFixed(0)+"k"},grid:{display:false}}}}}));

  // 8) Excess Return vs Ibovespa & CDI
  const c8=mkCanvas();
  const exVsIbov=wkData.map(d=>(d.k-d.i)*d.q);
  const exVsCDI=wkData.map(d=>(d.k-d.c)*d.q);
  charts.push(new Chart(c8,{type:"line",data:{labels:wkLabels,datasets:[
    {label:"vs Ibovespa",data:exVsIbov,borderColor:"#f87171",backgroundColor:"rgba(248,113,113,0.07)",fill:true,pointRadius:0,tension:0.3,borderWidth:2},
    {label:"vs CDI",data:exVsCDI,borderColor:"#fbbf24",backgroundColor:"rgba(251,191,36,0.07)",fill:true,pointRadius:0,tension:0.3,borderWidth:1.5,borderDash:[4,2]}
  ]},options:{...baseOpts,scales:{x:{ticks:{color:"#666",font:{size:8},maxTicksLimit:10},grid:{display:false}},y:{ticks:{color:"#666",font:{size:9},callback:v=>"R$"+(Math.abs(v)>=1000000?(v/1000000).toFixed(1)+"M":(v/1000).toFixed(0)+"k")},grid:{display:false}}}}}));

  // Esperar todos renderizarem, capturar e construir PDF
  setTimeout(()=>{
    const imgs={
      cotas:c1.toDataURL("image/png"),
      retornosMensais:c2.toDataURL("image/png"),
      riskRet:c3.toDataURL("image/png"),
      distrib:c4.toDataURL("image/png"),
      sharpe:c5.toDataURL("image/png"),
      drawdown:c6.toDataURL("image/png"),
      pl:c7.toDataURL("image/png"),
      excess:c8.toDataURL("image/png")
    };
    charts.forEach(ch=>ch.destroy());
    document.body.removeChild(tmpDiv);
    buildPDF(imgs);
  },400);
}

function buildPDF(imgs){
  const last=getLast(),cur=last.k,tc=getTotalCotas(),ta=getTotalAportes(),pl=tc*cur,lb=pl-ta,ll=lb*0.85;
  const kR=((cur/1)-1)*100,cR=((last.c/1)-1)*100,iR=((last.i/1)-1)*100,sR=((last.s/1)-1)*100;

  // Build print-friendly HTML
  let pdf=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${reportTitle}</title><style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;color:#1a1a2e;padding:40px;max-width:800px;margin:0 auto;font-size:13px}
    h1{font-size:20px;font-weight:800;margin-bottom:4px;color:#0c4a6e}
    h2{font-size:15px;font-weight:700;color:#0c4a6e;margin:24px 0 12px;padding-bottom:6px;border-bottom:2px solid #e2e8f0}
    .subtitle{font-size:11px;color:#64748b;margin-bottom:20px;font-family:'JetBrains Mono',monospace}
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .kpi-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px}
    .kpi-item .label{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
    .kpi-item .value{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#1a1a2e}
    table{width:100%;border-collapse:collapse;font-size:11px;font-family:'JetBrains Mono',monospace;margin-bottom:16px}
    th{background:#f1f5f9;padding:8px 10px;text-align:right;font-size:9px;text-transform:uppercase;letter-spacing:0.5px;color:#64748b;border-bottom:2px solid #e2e8f0}
    th:first-child{text-align:left}
    td{padding:6px 10px;border-bottom:1px solid #f1f5f9;text-align:right}
    td:first-child{text-align:left;color:#334155;font-weight:600}
    .green{color:#16a34a}.red{color:#dc2626}
    .footer{margin-top:30px;padding-top:12px;border-top:1px solid #e2e8f0;font-size:9px;color:#94a3b8;font-family:'JetBrains Mono',monospace;text-align:center}
    .perf-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .perf-item{text-align:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px}
    .perf-item .val{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace}
    .perf-item .lbl{font-size:9px;color:#64748b;margin-bottom:4px;text-transform:uppercase}
    .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px;page-break-inside:avoid}
    .chart-cell{background:transparent;border:none;padding:0;break-inside:avoid;page-break-inside:avoid}
    .chart-cell .chart-title{font-size:11px;font-weight:600;color:#334155;margin-bottom:6px;text-align:left;letter-spacing:0.2px}
    .chart-cell img{width:100%;height:auto;display:block;border:none}
    @media print{body{padding:20px}@page{margin:15mm;size:A4}@page{@top-left{content:none}@top-right{content:none}@bottom-left{content:none}@bottom-right{content:none}}}
  </style></head><body>`;

  pdf+=`<h1>${reportTitle}</h1>`;
  pdf+=`<div class="subtitle">Data base: ${fD(last.date)} · São Paulo, SP</div>`;

  if(reportSections.resumo){
    pdf+=`<h2>Resumo</h2>`;
    pdf+=`<div class="kpi-row">`;
    pdf+=`<div class="kpi-item"><div class="label">Cota Atual</div><div class="value">${cur.toFixed(6)}</div></div>`;
    pdf+=`<div class="kpi-item"><div class="label">PL do Clube</div><div class="value">${fBRL(pl)}</div></div>`;
    pdf+=`<div class="kpi-item"><div class="label">Lucro Bruto</div><div class="value">${fBRL(lb)}</div></div>`;
    pdf+=`<div class="kpi-item"><div class="label">Lucro Líquido</div><div class="value">${fBRL(ll)}</div></div>`;
    pdf+=`</div>`;
    pdf+=`<div class="perf-row">`;
    pdf+=`<div class="perf-item"><div class="lbl">Konstan</div><div class="val ${kR>=0?"green":"red"}">${kR.toFixed(2)}%</div></div>`;
    pdf+=`<div class="perf-item"><div class="lbl">CDI</div><div class="val">${cR.toFixed(2)}%</div></div>`;
    pdf+=`<div class="perf-item"><div class="lbl">Ibovespa</div><div class="val">${iR.toFixed(2)}%</div></div>`;
    pdf+=`<div class="perf-item"><div class="lbl">S&P500 (BRL)</div><div class="val">${sR.toFixed(2)}%</div></div>`;
    pdf+=`</div>`;
  }

  if(reportComment.trim()){
    pdf+=`<h2>Comentário do Gestor</h2><p style="font-size:13px;line-height:1.6;color:#334155;margin:0 0 16px">${reportComment.replace(/\n/g,"<br>")}</p>`;
  }

  if(reportSections.grafico){
    const pctCdiK=cR>0?((kR/cR)*100).toFixed(0):"—";
    const pctCdiI=cR>0?((iR/cR)*100).toFixed(0):"—";
    const pctCdiS=cR>0?((sR/cR)*100).toFixed(0):"—";
    pdf+=`<h2>Evolução das Cotas</h2>`;
    pdf+=`<table><thead><tr><th>Indicador</th><th>Retorno</th><th>% do CDI</th></tr></thead><tbody>`;
    pdf+=`<tr><td>Konstan</td><td>${kR>=0?"+":""}${kR.toFixed(2)}%</td><td>${pctCdiK}%</td></tr>`;
    pdf+=`<tr><td>CDI</td><td>${cR>=0?"+":""}${cR.toFixed(2)}%</td><td>100%</td></tr>`;
    pdf+=`<tr><td>Ibovespa</td><td>${iR>=0?"+":""}${iR.toFixed(2)}%</td><td>${pctCdiI}%</td></tr>`;
    pdf+=`<tr><td>S&P500 (BRL)</td><td>${sR>=0?"+":""}${sR.toFixed(2)}%</td><td>${pctCdiS}%</td></tr>`;
    pdf+=`</tbody></table>`;
  }

  if(reportSections.performance){
    const dp=calcDynPerf();const ar=calcAnnualReturns(dp);
    pdf+=`<h2>Retornos Anuais</h2>`;
    pdf+=`<div class="perf-row">`;
    ar.forEach(a=>{pdf+=`<div class="perf-item"><div class="lbl">${a.year}</div><div class="val ${a.ret>=0?"green":"red"}">${a.ret>=0?"+":""}${a.ret.toFixed(2)}%</div></div>`});
    pdf+=`</div>`;
    pdf+=`<h2>Performance Mensal</h2><table><thead><tr><th>Data</th><th>Konstan</th><th>CDI</th><th>Ibovespa</th><th>S&P500</th></tr></thead><tbody>`;
    dp.slice(-12).forEach(p=>{
      const fR=v=>(v>=0?"+":"")+v.toFixed(2)+"%";
      pdf+=`<tr><td>${fullMonth(p.m)}</td><td class="${p.rk>=0?"green":"red"}">${fR(p.rk)}</td><td class="${p.rc>=0?"green":"red"}">${fR(p.rc)}</td><td class="${p.ri>=0?"green":"red"}">${fR(p.ri)}</td><td class="${p.rs>=0?"green":"red"}">${fR(p.rs)}</td></tr>`});
    pdf+=`</tbody></table>`;
  }

  if(reportSections.indicadores){
    const byMonth={};rawData.forEach(d=>{const k=d.date.slice(0,7);if(!byMonth[k]||d.date>byMonth[k].date)byMonth[k]={...d}});
    const mKeys=Object.keys(byMonth).sort();
    const mRetK=[],mRetC=[],mRetI=[],mRetS=[];
    for(let i=1;i<mKeys.length;i++){const p=byMonth[mKeys[i-1]],cc=byMonth[mKeys[i]];mRetK.push(cc.k/p.k-1);mRetC.push(cc.c/p.c-1);mRetI.push(cc.i/p.i-1);mRetS.push(cc.s/p.s-1)}
    // Sharpe (since inception - all months)
    function calcSharpe(rets,rf){const exc=rets.map((v,j)=>v-rf[j]);const mean=exc.reduce((a,b)=>a+b,0)/exc.length;const std=Math.sqrt(exc.reduce((a,b)=>a+(b-mean)**2,0)/(exc.length-1));return std>0?(mean/std)*Math.sqrt(12):0}
    const shK=calcSharpe(mRetK,mRetC),shI=calcSharpe(mRetI,mRetC),shS=calcSharpe(mRetS,mRetC);
    // Max Drawdown
    let peakK2=rawData[0].k,maxDDK=0;rawData.forEach(d=>{if(d.k>peakK2)peakK2=d.k;const dd=(peakK2-d.k)/peakK2*100;if(dd>maxDDK)maxDDK=dd});
    let peakI2=rawData[0].i,maxDDI=0;rawData.forEach(d=>{if(d.i>peakI2)peakI2=d.i;const dd=(peakI2-d.i)/peakI2*100;if(dd>maxDDI)maxDDI=dd});
    let peakS2=rawData[0].s,maxDDS=0;rawData.forEach(d=>{if(d.s>peakS2)peakS2=d.s;const dd=(peakS2-d.s)/peakS2*100;if(dd>maxDDS)maxDDS=dd});
    // Volatility (daily, full period)
    const dRK2=[],dRI2=[],dRS2=[];
    for(let i=1;i<rawData.length;i++){dRK2.push(rawData[i].k/rawData[i-1].k-1);dRI2.push(rawData[i].i/rawData[i-1].i-1);dRS2.push(rawData[i].s/rawData[i-1].s-1)}
    function fVol(r){const n=r.length,m=r.reduce((a,b)=>a+b,0)/n;return Math.sqrt(r.reduce((a,b)=>a+(b-m)**2,0)/(n-1))*Math.sqrt(252)*100}
    const volKf=fVol(dRK2),volIf=fVol(dRI2),volSf=fVol(dRS2);
    function fDDn2(r){let s=0,n=0;r.forEach(x=>{if(x<0){s+=x*x;n++}});return n>0?Math.sqrt(s/n)*Math.sqrt(252)*100:0}
    const ddKf=fDDn2(dRK2),ddIf=fDDn2(dRI2),ddSf=fDDn2(dRS2);
    // MOIC: (última cota * qtd cotas) / aportes acumulados
    const moicK=(last.k*tc)/ta,moicI=(last.i*tc)/ta,moicS=(last.s*tc)/ta;
    // Retorno anualizado
    const nMo=mRetK.length;
    const arK=((last.k/1)**(12/nMo)-1)*100,arI=((last.i/1)**(12/nMo)-1)*100,arS=((last.s/1)**(12/nMo)-1)*100;

    pdf+=`<h2>Indicadores</h2>`;
    pdf+=`<table><thead><tr><th>Indicador</th><th>Konstan</th><th>Ibovespa</th><th>S&P500 (BRL)</th></tr></thead><tbody>`;
    pdf+=`<tr><td>Sharpe</td><td>${shK.toFixed(3)}</td><td>${shI.toFixed(3)}</td><td>${shS.toFixed(3)}</td></tr>`;
    pdf+=`<tr><td>Retorno Anualizado</td><td>${arK>=0?"+":""}${arK.toFixed(1)}%</td><td>${arI>=0?"+":""}${arI.toFixed(1)}%</td><td>${arS>=0?"+":""}${arS.toFixed(1)}%</td></tr>`;
    pdf+=`<tr><td>Downside Deviation (a.a.)</td><td>${ddKf.toFixed(1)}%</td><td>${ddIf.toFixed(1)}%</td><td>${ddSf.toFixed(1)}%</td></tr>`;
    pdf+=`<tr><td>Drawdown Máximo</td><td>-${maxDDK.toFixed(2)}%</td><td>-${maxDDI.toFixed(2)}%</td><td>-${maxDDS.toFixed(2)}%</td></tr>`;
    pdf+=`<tr><td>MOIC</td><td>${moicK.toFixed(2)}x</td><td>${moicI.toFixed(2)}x</td><td>${moicS.toFixed(2)}x</td></tr>`;
    pdf+=`</tbody></table>`;
  }

  // Gráficos — todos os 8 em grade 2 colunas, sem borda
  if(reportSections.graficos){
    pdf+=`<h2>Gráficos</h2>`;
    const gItems=[
      {title:"Evolução das Cotas",img:imgs.cotas},
      {title:"Retornos Mensais",img:imgs.retornosMensais},
      {title:"Risco × Retorno",img:imgs.riskRet},
      {title:"Distribuição dos Retornos Diários",img:imgs.distrib},
      {title:"Índice Sharpe (12M)",img:imgs.sharpe},
      {title:"Drawdown",img:imgs.drawdown},
      {title:"Patrimônio × Aportes Acumulados",img:imgs.pl},
      {title:"Excess Return — Konstan vs Ibovespa & CDI (R$)",img:imgs.excess}
    ];
    pdf+=`<div class="charts-grid">`;
    gItems.forEach(g=>{
      pdf+=`<div class="chart-cell"><div class="chart-title">${g.title}</div><img src="${g.img}"></div>`;
    });
    pdf+=`</div>`;
  }

  if(reportSections.investidores){
    pdf+=`<h2>Investidores</h2><table><thead><tr><th>Conta</th><th>MOIC</th><th>Aportes</th><th>PL Atual</th><th>Lucro Bruto</th><th>IR</th><th>Lucro Líq.</th><th>Part.</th></tr></thead><tbody>`;
    cotistas.forEach(c=>{const cpl=c.cotas*cur,clb=cpl-c.aportes,cir=clb>0?clb*0.15:0,cll=clb-cir,pct=cpl/pl;
      pdf+=`<tr><td>${c.conta}</td><td>${(cpl/c.aportes).toFixed(2)}x</td><td>${fBRL(c.aportes)}</td><td>${fBRL(cpl)}</td><td>${fBRL(clb)}</td><td>${fBRL(cir)}</td><td class="green">${fBRL(cll)}</td><td>${(pct*100).toFixed(1)}%</td></tr>`});
    pdf+=`<tr style="font-weight:700;border-top:2px solid #e2e8f0"><td>Total</td><td>${(pl/ta).toFixed(2)}x</td><td>${fBRL(ta)}</td><td>${fBRL(pl)}</td><td>${fBRL(lb)}</td><td>${fBRL(lb>0?lb*0.15:0)}</td><td class="green">${fBRL(ll)}</td><td>100%</td></tr>`;
    pdf+=`</tbody></table>`;
  }

  pdf+=`<div class="footer">Konstan Clube de Investimentos em Ações · São Paulo, SP · Gerado em ${new Date().toLocaleDateString("pt-BR")} às ${new Date().toLocaleTimeString("pt-BR")}</div>`;
  pdf+=`</body></html>`;

  const w=window.open("","_blank");
  w.document.write(pdf);
  w.document.close();
  setTimeout(()=>{w.print()},500);
}

// Auto-render on load — carrega os dados do Supabase Storage e então renderiza
bootDashboard();
</script>
</body>
