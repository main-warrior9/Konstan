<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konstan Clube de Investimentos em Ações</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ac:#56b3e8;--ac2:#8bc9f0;--bg:#080b14;--card:rgba(255,255,255,0.015);--bd:rgba(255,255,255,0.04);--grn:#22c55e;--red:#ef4444}
body{background:var(--bg);color:#edf0f5;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.mono{font-family:monospace}
.hidden{display:none!important}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--card);border:1px solid var(--bd);border-radius:24px;padding:48px 40px;width:360px;text-align:center}
.login-box h2{font-size:20px;font-weight:800;color:#edf0f5;letter-spacing:-0.3px;margin-bottom:4px}
.login-box h2 span{color:var(--ac)}
.login-input{background:rgba(255,255,255,0.03);border:1px solid var(--bd);border-radius:12px;padding:14px 18px;color:#edf0f5;font-size:15px;font-family:monospace;outline:none;width:100%;text-align:center;margin-bottom:16px;letter-spacing:1px}
.login-input.error{border-color:#ef4444}
.login-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#0c4a6e,#0369a1);color:var(--ac);font-size:14px;font-weight:700;cursor:pointer;font-family:monospace}
.login-btn:hover{opacity:0.85}
.err-msg{color:#ef4444;font-size:11px;font-family:monospace;margin:-10px 0 14px}
.header{padding:28px 28px 22px;background:linear-gradient(180deg,rgba(86,179,232,0.03) 0%,transparent 100%);border-bottom:1px solid var(--bd)}
.header-inner{display:flex;align-items:center;gap:12px}
.header h1{margin:0;font-size:20px;font-weight:800;letter-spacing:-0.3px}
.header h1 span{color:var(--ac)}
.header .sub{font-size:11px;color:#505a6b;margin-top:2px;font-family:monospace}
.refresh-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--bd);background:var(--card);color:#505a6b;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;margin-left:auto}
.refresh-btn:hover{color:var(--ac);background:rgba(86,179,232,0.08)}
.refresh-btn.spinning{transform:rotate(360deg);color:var(--ac)}
.tabs-wrap{padding:16px 28px 0}
.tabs{display:inline-flex;gap:2px;background:rgba(255,255,255,0.02);border-radius:10px;padding:3px;border:1px solid var(--bd)}
.tab-btn{padding:8px 18px;border-radius:8px;border:none;background:transparent;color:#505a6b;font-size:12px;font-weight:700;cursor:pointer;font-family:monospace;letter-spacing:0.3px}
.tab-btn.active{background:rgba(86,179,232,0.09);color:var(--ac)}
.content{padding:20px 28px 40px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;transition:all 0.3s;overflow:hidden}
.kpi:hover{background:rgba(86,179,232,0.04);border-color:rgba(86,179,232,0.15)}
.kpi-label{font-size:10px;color:#505a6b;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:6px;font-weight:600}
.kpi-value{font-size:20px;font-weight:700;color:#edf0f5;font-family:monospace;letter-spacing:-0.5px}
.kpi-sub{font-size:11px;margin-top:5px;font-weight:500;font-family:monospace}
.kpi-sub.green{color:var(--grn)}.kpi-sub.red{color:var(--red)}.kpi-sub.gray{color:#505a6b}
.period-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.period-btn{padding:6px 13px;border-radius:8px;border:none;background:transparent;color:#505a6b;font-size:12px;font-weight:700;cursor:pointer;font-family:monospace}
.period-btn.active{background:rgba(86,179,232,0.13);color:var(--ac)}
.chart-box{background:var(--card);border-radius:16px;border:1px solid var(--bd);padding:20px 12px 12px}
.perf-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.perf-card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px 18px}
.perf-card .label{font-size:10px;color:#505a6b;text-transform:uppercase;letter-spacing:1.4px;margin-bottom:6px;font-weight:600}
.perf-card .big{font-size:24px;font-weight:800;color:#edf0f5;font-family:monospace}
.perf-card .small{font-size:11px;margin-top:5px;font-weight:500;font-family:monospace}
.annual-grid{display:grid;gap:10px;margin-bottom:28px}
.annual-card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;text-align:center}
.data-table{width:100%;border-collapse:collapse;font-family:monospace;font-size:12px}
.data-table th{padding:12px 16px;color:#505a6b;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--bd)}
.data-table td{padding:12px 16px;border-bottom:1px solid var(--bd)}
.data-table tr:hover{background:rgba(86,179,232,0.03)}
.part-bar{width:50px;height:4px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px}
.part-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:4px}
.totals-row{margin-top:16px;background:var(--card);border-radius:14px;border:1px solid var(--bd);padding:16px 20px;display:flex;justify-content:space-around;flex-wrap:wrap;gap:12px}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.input-card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:24px}
.input-card h3{margin:0;font-size:15px;font-weight:700;color:#edf0f5;display:inline}
.input-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.input-label{font-size:10px;color:#505a6b;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:700;display:block}
.input-field{background:rgba(255,255,255,0.03);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;color:#edf0f5;font-size:14px;font-family:monospace;outline:none;width:100%;margin-bottom:14px}
.btn-cota{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#0c4a6e,#0369a1);color:var(--ac);font-size:13px;font-weight:700;cursor:pointer;font-family:monospace}
.btn-aporte{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b0764,#5b21b6);color:#a78bfa;font-size:13px;font-weight:700;cursor:pointer;font-family:monospace}
.log-box{margin-top:20px;background:var(--card);border-radius:14px;border:1px solid var(--bd);padding:18px}
.log-entry{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd)}
.log-entry:last-child{border-bottom:none}
.lock-screen{display:flex;align-items:center;justify-content:center;min-height:400px}
.lock-box{background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:40px 36px;width:320px;text-align:center}
.lock-icon{width:56px;height:56px;border-radius:16px;background:rgba(86,179,232,0.07);border:1px solid rgba(86,179,232,0.13);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.footnote{font-size:9px;color:#3b4252;margin-top:10px;font-family:monospace}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <h2><span>Konstan</span> Clube de Investimentos em Ações</h2>
    <p style="font-size:11px;color:#505a6b;font-family:monospace;margin-bottom:4px">CNPJ 51.249.638/0001-00</p>
    <p style="font-size:12px;color:#505a6b;margin-bottom:28px">Acesso restrito aos membros do clube</p>
    <input type="password" id="loginPw" class="login-input" placeholder="Digite a senha" onkeydown="if(event.key==='Enter')doLogin()">
    <p id="loginErr" class="err-msg hidden">Senha incorreta</p>
    <button class="login-btn" onclick="doLogin()">ENTRAR</button>
  </div>
</div>
<div id="dashboard" class="hidden">
  <div class="header"><div class="header-inner">

</div>

h+=`<span class="period-return" style="color:${pR>=0?"var(--grn)":"var(--red)"}">${fPct(pR)}</span></div><div class="chart-box"><canvas id="cotaChart" height="280"></canvas></div>`;
const kR=((cur/1)-1)*100,cR=((cdiLast/1)-1)*100,iR=((ibovAccum/1)-1)*100;
h+=`<div class="perf-cards"><div class="perf-card"><div class="label">Konstan (desde início)</div><div class="big">${kR.toFixed(2).replace(".",",")}%</div><div class="small" style="color:var(--grn)">Cota: ${cur.toFixed(6).replace(".",",")}</div></div><div class="perf-card"><div class="label">CDI (desde início)</div><div class="big">${cR.toFixed(2).replace(".",",")}%</div><div class="small" style="color:#505a6b">Acum: ${cdiLast.toFixed(6).replace(".",",")}</div></div><div class="perf-card"><div class="label">Ibovespa (desde início)</div><div class="big">${iR.toFixed(2).replace(".",",")}%</div><div class="small" style="color:#505a6b">Acum: ${ibovAccum.toFixed(6).replace(".",",")}</div></div></div>`;
h+=`<p class="footnote">* Lucro líquido estimado com alíquota de 15% sobre ganho de capital. PL = ${tc.toFixed(4)} cotas x ${cur.toFixed(6)} (cota)</p>`;
document.getElementById("tab-capa").innerHTML=h;
setTimeout(()=>{const ctx=document.getElementById("cotaChart");if(!ctx)return;if(cotaChart)cotaChart.destroy();cotaChart=new Chart(ctx,{type:"line",data:{labels:filtered.map(d=>{const[,m,dd]=d.date.split("-");return dd+"/"+m}),datasets:[{label:"Konstan",data:filtered.map(d=>d.value),borderColor:"#56b3e8",backgroundColor:"rgba(86,179,232,0.08)",fill:true,tension:0.3,pointRadius:0,pointHitRadius:8,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"Konstan: "+c.parsed.y.toFixed(6)}}},scales:{x:{ticks:{color:"#3b4252",font:{size:9,family:"monospace"},maxTicksLimit:8},grid:{color:"rgba(255,255,255,0.03)"}},y:{ticks:{color:"#3b4252",font:{size:9,family:"monospace"},callback:v=>v.toFixed(2)},grid:{color:"rgba(255,255,255,0.03)"}}}}})},50)}

function renderPerformance(){const dp=calcDynPerf(),ar=calcAnnualReturns(dp);
let h=`<h3 style="font-size:15px;color:#edf0f5;font-weight:700;margin-bottom:14px">Retornos Anuais</h3><div class="annual-grid" style="grid-template-columns:repeat(${ar.length},1fr)">`;
ar.forEach(a=>{h+=`<div class="annual-card"><div style="font-size:12px;color:#505a6b;font-weight:700;margin-bottom:8px">${a.year}</div><div style="font-size:22px;font-weight:800;font-family:monospace;color:${a.ret>=0?"var(--grn)":"var(--red)"}">${a.ret>=0?"+":""}${a.ret.toFixed(2)}%</div><div style="font-size:10px;color:#505a6b;margin-top:6px;font-family:monospace">Cota: ${a.cota.toFixed(6)}</div></div>`});
h+=`</div><h3 style="font-size:15px;color:#edf0f5;font-weight:700;margin-bottom:14px">Retornos Mensais</h3><div class="chart-box"><canvas id="barChart" height="340"></canvas></div>`;
h+=`<h3 style="font-size:15px;color:#edf0f5;font-weight:700;margin:28px 0 12px">Cotas Mensais</h3><div style="background:var(--card);border-radius:14px;border:1px solid var(--bd);overflow:hidden"><div style="overflow-x:auto"><table class="data-table"><thead><tr><th style="text-align:left">Mês</th><th style="text-align:right">Retorno</th><th style="text-align:right">Cota</th></tr></thead><tbody>`;
dp.forEach(p=>{h+=`<tr><td style="color:#c9d1d9">${p.m}</td><td style="text-align:right;color:${p.r>=0?"var(--grn)":"var(--red)"};font-weight:600">${p.r>=0?"+":""}${p.r.toFixed(2)}%</td><td style="text-align:right;color:#8a94a6">${p.c.toFixed(6)}</td></tr>`});
h+=`</tbody></table></div></div>`;document.getElementById("tab-performance").innerHTML=h;
setTimeout(()=>{const ctx=document.getElementById("barChart");if(!ctx)return;if(barChart)barChart.destroy();barChart=new Chart(ctx,{type:"bar",data:{labels:dp.map(d=>d.m),datasets:[{data:dp.map(d=>d.r),backgroundColor:dp.map(d=>d.r>=0?"#22c55e":"#ef4444"),borderRadius:3,barPercentage:0.7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>(c.parsed.y>=0?"+":"")+c.parsed.y.toFixed(2)+"%"}}},scales:{x:{ticks:{color:"#707a8a",font:{size:8,family:"monospace"},maxRotation:45},grid:{display:false}},y:{ticks:{color:"#505a6b",font:{size:9,family:"monospace"},callback:v=>v.toFixed(0)+"%"},grid:{color:"rgba(255,255,255,0.03)"}}}}})},50)}

function renderCotistas(){const cur=getCota(),tc=getTotalCotas(),pl=tc*cur,ta=getTotalAportes();
let h=`<div style="background:var(--card);border-radius:16px;border:1px solid var(--bd);overflow:hidden"><table class="data-table"><thead><tr><th style="text-align:left">Conta</th><th style="text-align:right">Aportes</th><th style="text-align:right">PL Atual</th><th style="text-align:right">Lucro Bruto</th><th style="text-align:right">Lucro Líquido</th><th style="text-align:right">Part. %</th></tr></thead><tbody>`;
cotistas.forEach(c=>{const cpl=c.cotas*cur,lb=cpl-c.aportes,ir=lb>0?lb*0.15:0,ll=lb-ir,pct=cpl/pl;h+=`<tr><td style="font-weight:600;font-size:13px;color:#edf0f5">${c.conta}</td><td style="text-align:right;color:#c9d1d9;font-weight:600">${fBRL(c.aportes)}</td><td style="text-align:right;color:var(--ac);font-weight:700">${fBRL(cpl)}</td><td style="text-align:right;color:${lb>=0?"var(--grn)":"var(--red)"};font-weight:600">${fBRL(lb)}</td><td style="text-align:right;color:${ll>=0?"var(--grn)":"var(--red)"};font-weight:600">${fBRL(ll)}</td><td style="text-align:right"><span style="color:#8a94a6;font-weight:600">${(pct*100).toFixed(1)}%</span><div class="part-bar"><div class="part-fill" style="width:${pct*100}%"></div></div></td></tr>`});
h+=`</tbody></table></div><div class="totals-row"><div style="text-align:center"><div style="font-size:9px;color:#505a6b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600">Total Aportes</div><div style="font-size:16px;font-weight:700;font-family:monospace;color:#edf0f5">${fBRL(ta)}</div></div><div style="text-align:center"><div style="font-size:9px;color:#505a6b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600">PL Total</div><div style="font-size:16px;font-weight:700;font-family:monospace;color:var(--ac)">${fBRL(pl)}</div></div><div style="text-align:center"><div style="font-size:9px;color:#505a6b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600">Lucro Líq. Total</div><div style="font-size:16px;font-weight:700;font-family:monospace;color:var(--grn)">${fBRL((pl-ta)*0.85)}</div></div></div>`;
document.getElementById("tab-cotistas").innerHTML=h}

function renderInput(){if(!inputUnlocked){document.getElementById("tab-input").innerHTML=`<div class="lock-screen"><div class="lock-box"><div class="lock-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#56b3e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg></div><h3 style="margin:0 0 6px;font-size:16px;font-weight:700;color:#edf0f5">Área restrita</h3><p style="margin:0 0 20px;font-size:12px;color:#505a6b">Digite a senha para acessar.</p><input type="password" id="inputPw" class="login-input" style="font-size:14px;padding:12px 16px;margin-bottom:14px" placeholder="Senha" onkeydown="if(event.key==='Enter')unlockInput()"><p id="inputErr" class="err-msg hidden">Senha incorreta</p><button class="login-btn" style="font-size:13px;padding:12px" onclick="unlockInput()">DESBLOQUEAR</button></div></div>`;return}
const opts=cotistas.map(c=>`<option value="${c.conta}">${c.conta}</option>`).join("");
let h=`<div class="input-grid"><div class="input-card"><div style="display:flex;align-items:center;margin-bottom:20px"><span class="input-dot" style="background:var(--ac);box-shadow:0 0 8px rgba(86,179,232,0.4)"></span><h3>Cota</h3></div><label class="input-label">Data</label><input type="date" id="cotaDate" class="input-field"><label class="input-label">Valor da Cota</label><input type="number" step="0.000001" id="cotaValue" class="input-field" placeholder="2.477381"><button class="btn-cota" onclick="addCota()">REGISTRAR COTA</button></div><div class="input-card"><div style="display:flex;align-items:center;margin-bottom:20px"><span class="input-dot" style="background:#a78bfa;box-shadow:0 0 8px rgba(167,139,250,0.4)"></span><h3>Aporte</h3></div><label class="input-label">Conta</label><select id="aporteConta" class="input-field" style="appearance:auto;cursor:pointer">${opts}</select><label class="input-label">Data</label><input type="date" id="aporteDate" class="input-field"><label class="input-label">Valor (R$)</label><input type="number" step="0.01" id="aporteValue" class="input-field" placeholder="10000.00"><button class="btn-aporte" onclick="addAporte()">REGISTRAR APORTE</button></div></div>`;
if(inputLog.length>0){h+=`<div class="log-box"><div style="font-size:10px;color:#505a6b;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;font-weight:700">Histórico</div>`;inputLog.forEach(l=>{h+=`<div class="log-entry"><div style="width:5px;height:5px;border-radius:50%;background:${l.type==="success"?"var(--grn)":"var(--red)"};flex-shrink:0"></div><span style="font-size:10px;color:#3b4252;font-family:monospace;flex-shrink:0;min-width:60px">${l.ts}</span><span style="font-size:12px;color:${l.type==="error"?"var(--red)":"#8a94a6"}">${l.msg}</span></div>`});h+=`</div>`}
document.getElementById("tab-input").innerHTML=h}

function unlockInput(){if(document.getElementById("inputPw").value==="Konstan123"){inputUnlocked=true;renderInput()}else{document.getElementById("inputErr").classList.remove("hidden");document.getElementById("inputPw").classList.add("error");document.getElementById("inputPw").value=""}}
function addCota(){const d=document.getElementById("cotaDate").value,v=parseFloat(document.getElementById("cotaValue").value);if(!d||isNaN(v)){logI("Preencha todos os campos.","error");renderInput();return}const idx=rawData.findIndex(r=>r.date===d);if(idx>=0)rawData[idx]={date:d,value:v};else rawData.push({date:d,value:v});rawData.sort((a,b)=>a.date.localeCompare(b.date));logI(`Cota ${v} em ${d}`,"success");renderInput()}
function addAporte(){const conta=document.getElementById("aporteConta").value,d=document.getElementById("aporteDate").value,v=parseFloat(document.getElementById("aporteValue").value);if(!d||isNaN(v)){logI("Preencha todos os campos.","error");renderInput();return}const cur=getCota(),nc=v/cur;cotistas=cotistas.map(c=>c.conta===conta?{...c,aportes:c.aportes+v,cotas:c.cotas+nc}:c);logI(`Aporte R$ ${v} - Conta ${conta} em ${d}`,"success");renderInput()}
function logI(msg,type){inputLog.unshift({msg,type,ts:new Date().toLocaleTimeString("pt-BR")});if(inputLog.length>15)inputLog.pop()}
</script>
</body>
</html>
