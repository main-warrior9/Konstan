# .github/workflows/deploy.yml
# Publica o site estático (index.html na raiz) no GitHub Pages sem Jekyll.
# Antes de usar: Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".

name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:      # permite rodar manualmente pela aba Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys concorrentes; não cancela um deploy em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # raiz do repositório (onde está o index.html)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
